version: 2
updates:
  - package-ecosystem: "cargo"
    target-branch: "develop"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
    open-pull-requests-limit: 5
    cooldown:
      default-days: 7

  - package-ecosystem: "github-actions"
    target-branch: "develop"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "area:ci"
    cooldown:
      default-days: 7
